<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="roadGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>
  <!-- Background glow -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#roadGrad)" stroke-width="2" opacity="0.3" stroke-dasharray="6 4" />
  
  <!-- Outer Ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#roadGrad)" stroke-width="3" />
  
  <!-- Road Perspective Lines -->
  <path d="M35 75 L45 35 L55 35 L65 75 Z" fill="#151D30" stroke="url(#roadGrad)" stroke-width="2" />
  
  <!-- Dashed center lane -->
  <path d="M50 72 L50 62 M50 54 L50 46 M50 40 L50 36" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" />
  
  <!-- Safety Radar Shield/Pulse at top -->
  <path d="M50 18 L68 26 L68 45 C68 56 59 66 50 70 C41 66 32 56 32 45 L32 26 Z" fill="none" stroke="url(#shieldGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="50" cy="38" r="4" fill="#10B981" />
</svg>
